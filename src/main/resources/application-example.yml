spring:
  application:
    name: shopping-guide
  ai:
    openai:
      api-key: YOUR_DASHSCOPE_API_KEY        # 替换为你的阿里云 DashScope API Key
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-v3
    vectorstore:
      elasticsearch:
        index-name: products
        dimensions: 1024
  datasource:
    url: jdbc:mysql://YOUR_MYSQL_HOST:3306/shopping_guide?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: YOUR_DB_USERNAME              # 替换为你的数据库用户名
    password: YOUR_DB_PASSWORD              # 替换为你的数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: YOUR_REDIS_HOST                 # 替换为你的 Redis 地址
      port: 6379
  elasticsearch:
    uris: http://YOUR_ES_HOST:9200          # 替换为你的 Elasticsearch 地址
